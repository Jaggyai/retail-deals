<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Amazon...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a1628;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 2.5rem; margin-bottom: 16px; }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.9rem; color: #8a9ab5; margin-bottom: 32px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,107,43,0.2);
      border-top-color: #ff6b2b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fallback-btn {
      display: inline-block;
      background: #ff6b2b;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 8px;
    }
    .note { font-size: 0.75rem; color: #556; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="logo">🛒</div>
  <h1>Opening Amazon...</h1>
  <p>Taking you straight to the app</p>
  <div class="spinner"></div>
  <a class="fallback-btn" id="fallback" href="https://amzn.to/44Ei4qc" target="_blank" rel="noopener">
    Open in Browser Instead →
  </a>
  <p class="note">If the app didn't open automatically, tap the button above.</p>

  <script>
    (function () {
      var TARGET = 'https://amzn.to/44Ei4qc';
      var ua = navigator.userAgent || '';
      var isIOS     = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isAndroid) {
        // Android intent: launch Amazon Shopping app directly
        // Falls back to Play Store if not installed
        window.location.href =
          'intent://amzn.to/44Ei4qc' +
          '#Intent;scheme=https;' +
          'package=com.amazon.mShop.android.shopping;' +
          'S.browser_fallback_url=' + encodeURIComponent(TARGET) + ';end';

      } else if (isIOS) {
        // iOS: try the amzn:// URI scheme to open the app
        var appOpen = false;
        window.addEventListener('blur', function () { appOpen = true; });

        // Attempt to open the app
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'amzn://amzn.to/44Ei4qc';
        document.body.appendChild(iframe);

        setTimeout(function () {
          if (!appOpen) {
            // App not installed — go to browser
            window.location.href = TARGET;
          }
        }, 1500);

      } else {
        // Desktop — just go to the link
        window.location.href = TARGET;
      }
    })();
  </script>
</body>
</html>
